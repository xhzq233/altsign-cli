name: Build & Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Build
        run: ./build.sh

      - name: Smoke test
        run: test -x altsign-cli && ./altsign-cli --help || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: altsign-cli
